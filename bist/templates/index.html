<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BIST Temettu Tarayici</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/styles.css" rel="stylesheet">
</head>
<body>
  <div class="hero-bg"></div>
  <main class="container py-4 py-md-5">
    <section class="card shadow-lg border-0 scanner-card">
      <div class="card-body p-4 p-md-5">
        <h1 class="display-6 fw-bold mb-2">BIST Hisse Tarayici</h1>
        <p class="text-secondary mb-4">
          TradingView Scanner API uzerinden su filtreleri uygular: F/K &lt; 8, Temettu &gt; %8,
          Piyasa Degeri &gt; 5 Mr TL ve sadece common stock.
        </p>

        <form id="scanForm" class="row g-3 align-items-end">
          <div class="col-12 col-md-3">
            <label for="peMax" class="form-label">Maks. F/K</label>
            <input id="peMax" type="number" class="form-control" min="0" step="0.1" value="8">
          </div>
          <div class="col-12 col-md-3">
            <label for="dividendMin" class="form-label">Min. Temettu (%)</label>
            <input id="dividendMin" type="number" class="form-control" min="0" step="0.1" value="8">
          </div>
          <div class="col-12 col-md-3">
            <label for="marketCapMin" class="form-label">Min. Piyasa Degeri (TL)</label>
            <input id="marketCapMin" type="text" inputmode="numeric" class="form-control" value="5000000000">
          </div>
          <div class="col-12 col-md-2">
            <label for="limit" class="form-label">Sonuc Adedi</label>
            <input id="limit" type="number" class="form-control" min="1" max="200" step="1" value="20">
          </div>
          <div class="col-12 col-md-1 d-grid">
            <button type="submit" id="scanBtn" class="btn btn-primary">Tara</button>
          </div>
        </form>

        <div class="d-flex justify-content-between align-items-center mt-4 mb-2">
          <h2 class="h5 m-0">Sonuclar</h2>
          <small id="resultMeta" class="text-secondary"></small>
        </div>

        <div id="errorBox" class="alert alert-danger d-none" role="alert"></div>

        <div class="table-responsive">
          <table class="table table-hover align-middle" id="resultTable">
            <thead class="table-light">
              <tr>
                <th>Sembol</th>
                <th>Fiyat</th>
                <th>F/K</th>
                <th>Temettu %</th>
                <th>Piyasa Degeri</th>
                <th>Borc/Ser</th>
                <th>PD/DD</th>
                <th>ROE %</th>
                <th>Sektor</th>
              </tr>
            </thead>
            <tbody id="resultBody">
              <tr>
                <td colspan="9" class="text-center text-secondary py-4">Tarama baslatmak icin "Tara" butonuna basin.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
